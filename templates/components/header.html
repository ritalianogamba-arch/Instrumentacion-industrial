<header class="page-header">
    <img src="{{ url_for('static', filename='logo_unrc.png') }}" class="header-logo" alt="Logo UNRC">
    <div class="header-title">
        <h1>Planta de Control de Tanques</h1>
        <h2>Instrumentacion industrial (Cod. 0434)</h2>
    </div>
    
    {% if status %}
    <div id="status-badge" class="status-badge {{ 'status-offline' if status == 'Simulado' else 'status-online' }}">
        <div class="status-dot"></div>
        <span id="status-text">{{ 'Modo Simulación' if status == 'Simulado' else 'Sistema Online' }}</span>
    </div>
    {% endif %}

    <img src="{{ url_for('static', filename='logo_fi.png') }}" class="header-logo" alt="Logo FI">

    <!-- Tabs Navigation -->
    <nav class="tabs-header">
        <button class="tab-button" onclick="openTab('tab-monitoreo', this)">Monitoreo</button>
        <button class="tab-button" onclick="openTab('tab-visual', this)">Visual</button>
        <button class="tab-button" onclick="openTab('tab-graficas', this)">Gráficas</button>
    </nav>
</header>
