<div id="tab-pid" class="tab-content" style="display: none; padding: 20px;">
    <div class="pid-card-container">
        {% for pid in elementos.pids %}
        {% set suffix = 't2' if pid.identifier == 1 else 't4' %}
        <div class="pid-card {{ 'tacho-2-card' if pid.identifier == 1 else 'tacho-4-card' }}">
            <h3 class="card-title">{{ pid.nombre }}</h3>
            <div class="pid-section">
                <!-- ... Inputs ... -->
                <div class="pid-input-row">
                    <label>SetPoint:</label>
                    <input type="number" id="sp-{{ suffix }}">
                    <span id="read-sp-{{ suffix }}" class="pid-val-display">--</span>
                </div>
                <div class="pid-input-row">
                    <label>Kp:</label>
                    <input type="number" id="kp-{{ suffix }}">
                    <span id="read-kp-{{ suffix }}" class="pid-val-display">--</span>
                </div>
                <div class="pid-input-row">
                    <label>Ti:</label>
                    <input type="number" id="ti-{{ suffix }}">
                    <span id="read-ti-{{ suffix }}" class="pid-val-display">--</span>
                </div>
                <div class="pid-input-row">
                    <label>Td:</label>
                    <input type="number" id="td-{{ suffix }}">
                    <span id="read-td-{{ suffix }}" class="pid-val-display">--</span>
                </div>
                <div class="btn-group">
                    <button class="btn-small btn-read" onclick="ioPID('{{ suffix | upper }}', 'read')">Leer</button>
                    <button class="btn-small btn-write" onclick="ioPID('{{ suffix | upper }}', 'write')">Cargar</button>
                </div>
            </div>
            <div class="pid-section status-section">
                <div class="status-row">
                    <span>Control PID (%M{{ pid.boton_virtual_address }}):</span>
                    <button id="btn-pid-{{ suffix }}" class="toggle-btn"
                        onclick="toggleGenericPID('{{ suffix | upper }}', {{ pid.boton_virtual_address }}, '{{ 'coil' if pid.identifier == 1 else 'reg' }}')">
                        OFF
                    </button>
                </div>
                <div class="status-row-divider"></div>
                <div class="status-row">
                    <span>Nivel Seguro (%M{{ pid.address_set_point }}):</span>
                    <span id="permiso-{{ suffix }}" class="status-indicator">--</span>
                </div>
            </div>
            <div class="pid-footer">
                Temp: <span id="temp-{{ suffix }}-val">--</span> | Salida: <span id="out-{{ suffix }}-val">--</span>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
