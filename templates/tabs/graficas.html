<div id="tab-graficas" class="tab-content" style="display: none; padding: 20px;">
    <div class="chart-controls">
        <label class="auto-scale-label">
            <input type="checkbox" id="autoScale" checked onchange="toggleScaleMode()">
            Seguimiento Automático
        </label>
        
        <div id="manualControls" class="manual-controls" style="display:none;">
            <label>Min: <input type="number" id="chartMin" value="0"></label>
            <label>Max: <input type="number" id="chartMax" value="100"></label>
            <button class="btn-apply" onclick="applyManualScale()">Aplicar</button>
        </div>
    </div>
    
    <div class="charts-container">
        {% for pid in elementos.pids %}
        {% set pid_id = 'T2' if '2' in pid.nombre else 'T4' %}
        <div class="chart-wrapper">
            <h4 class="chart-title {{ 't2-color' if pid_id == 'T2' else 't4-color' }}">{{ pid.nombre }}</h4>
            <div class="canvas-container">
                <canvas id="chart{{ pid_id }}"></canvas>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
