<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planta de Control de Tanques</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
    
    <!-- Component: Header -->
    {% include 'components/header.html' %}

    <main class="tabs-container">
        <!-- Tabs Navigation -->
        <nav class="tabs-header">
            <button class="tab-button" onclick="openTab('tab-monitoreo', this)">Monitoreo</button>
            <button class="tab-button" onclick="openTab('tab-visual', this)">Visual</button>
            <button class="tab-button" onclick="openTab('tab-graficas', this)">Gráficas</button>
        </nav>

        <!-- Tab Contents -->
        {% include 'tabs/monitoreo.html' %}
        {% include 'tabs/visual.html' %}
        {% include 'tabs/graficas.html' %}
    </main>

    <!-- Bloqueo Remoto Notice -->
    <div id="remote-lock-notice" class="remote-lock-notice">
        ⚠️ Mando Remoto Deshabilitado (Mantenimiento)
    </div>

    <!-- Modular Logic -->
    <script>
        const CONFIG_TANQUES = {
            {% for t in elementos.tanques %}
            "T{{ t.nombre.split()[-1] }}": {
                sensor: {{ t.sensor_de_presion }},
                sp: {{ t.SetPoint_Level }},
                min: {{ t.min_val }},
                max: {{ t.max_val }}
            }{{ ',' if not loop.last }}
            {% endfor %}
        };

        const CONFIG_ACTUADORES = {
            {% for a in elementos.salidas_analogicas %}
            "{{ a.address }}": {
                min: {{ a.min_val }},
                max: {{ a.max_val }},
                unidad: "{{ a.unidad }}"
            }{{ ',' if not loop.last }}
            {% endfor %}
        };

        // Escalamiento de temperatura y nivel — sincronizado con config/plc.py
        window.PLC_SENDS_SCALED_TEMP = {{ 'true' if plc_sends_scaled_temp else 'false' }};
        window.PLC_SENDS_SCALED_LEVEL = {{ 'true' if plc_sends_scaled_level else 'false' }};
    </script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/control.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
