<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redireccionando a la Planta...</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f7f7f7; }
        .box { text-align:center; padding:24px; border-radius:8px; background:white; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
        button { margin-top:12px; padding:8px 14px; border-radius:6px; border:1px solid #ddd; background:#007bff; color:white; cursor:pointer }
        button:disabled { opacity:0.6 }
    </style>
    <script>
        async function redireccionar() {
            const msg = document.getElementById('mensaje');
            try {
                let response = await fetch('enlace.json', { cache: 'no-store' });
                if (!response.ok) throw new Error('No file');
                let data = await response.json();
                if (data && data.url_ngrok) {
                    window.location.href = data.url_ngrok;
                    return;
                }
                msg.innerText = "La planta parece estar apagada o no hay enlace configurado.";
            } catch (error) {
                msg.innerText = "La planta parece estar apagada.";
            }
        }
        function reintentar(){ document.getElementById('mensaje').innerText='Reintentando...'; redireccionar(); }
        window.onload = redireccionar;
    </script>
</head>
<body>
    <div class="box">
        <h2 id="mensaje">Conectando con el laboratorio, por favor espere...</h2>
        <div>
            <button onclick="reintentar()">Reintentar</button>
        </div>
    </div>
</body>
</html>
